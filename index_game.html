<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <!-- Liên kết CSS -->
    <link rel="stylesheet" href="style_game.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Vocabulary for IELTS</h1>
            <button class="options-btn">Options</button>
            <button class="trial-btn">Start free trial</button>
        </div>
    
        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    
        <!-- Question Section -->
        <div class="question-section">
            <p class="definition-text" id="questionText"></p>
            <div class="image-section">
                <img src="path_to_image.png" alt="Diagram" />
            </div>
            <p class="feedback-text" id="feedbackText"></p>
        </div>
    
        <!-- Answer Options -->
        <div class="answer-options" id="answerOptions"></div>
    
        <!-- Footer -->
        <div class="footer">
            <p>Don't know?</p>
        </div>
    </div>
    
    <!-- Liên kết JavaScript -->
    <script src="app_game.js"></script>
</body>
</html>
