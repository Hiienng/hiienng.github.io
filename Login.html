<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SZ2PGMC55Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SZ2PGMC55Q');
    </script>

    <!-- Favicon -->
    <link rel="icon" href="/assets/icon_final.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS101hub | Login</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style_index.css" />
    
    <!-- Inline Style for Basic Layout -->
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc); /* Gradient background */
        }

        .login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background-color: #47a447;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #398439;
        }

        .forgot-link {
            display: block;
            margin-top: 10px;
            font-size: 14px;
            color: #0066cc;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="tabs">
            <button id="login-tab" class="active" onclick="showLogin()">Login</button>
            <button id="register-tab" onclick="showRegister()">Register</button>
        </div>

        <form id="auth-form" action="/login" method="POST">
            <div id="login-fields">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
            </div>

            <div id="register-fields" style="display: none;">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="register-email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="register-password" name="password" required>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm_password" required>
                </div>
            </div>

            <button type="submit" class="login-btn" id="submit-btn">ĐĂNG NHẬP</button>
        </form>

        <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
    </div>

    <script>
        // Show Login form and hide Register form
        function showLogin() {
            document.getElementById('auth-form').action = '/login';
            document.getElementById('login-tab').classList.add('active');
            document.getElementById('register-tab').classList.remove('active');
            document.getElementById('login-fields').style.display = 'block';
            document.getElementById('register-fields').style.display = 'none';
            document.getElementById('submit-btn').textContent = 'ĐĂNG NHẬP';
            document.getElementById('forgot-link').style.display = 'block'; // Show forgot password link
        }

        // Show Register form and hide Login form
        function showRegister() {
            document.getElementById('auth-form').action = '/register';
            document.getElementById('register-tab').classList.add('active');
            document.getElementById('login-tab').classList.remove('active');
            document.getElementById('login-fields').style.display = 'none';
            document.getElementById('register-fields').style.display = 'block';
            document.getElementById('submit-btn').textContent = 'ĐĂNG KÝ';
            document.getElementById('forgot-link').style.display = 'none'; // Hide forgot password link
        }
    </script>
</body>
</html>
</html>
