<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập/Đăng Ký</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #000; /* Nền màu đen */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://example.com/icon-background.png'); /* Thay bằng link hình ảnh nền chứa các icon xám */
            background-repeat: no-repeat;
            background-size: cover;
            background-blend-mode: overlay;
            background-color: rgba(0, 0, 0, 0.8); /* Lớp màu đen nhẹ phủ lên */
        }

        .login-register-container {
            background: rgba(0, 0, 0, 0.9); /* Nền đen nhẹ hơn một chút */
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.7);
            width: 400px;
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 2px solid #444;
        }

        .tabs button {
            width: 50%;
            padding: 10px;
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            outline: none;
            transition: color 0.3s, border-bottom 0.3s;
        }

        .tabs button.active {
            border-bottom: 2px solid #ff6600;
            color: #ff6600;
        }

        .form-box {
            display: none;
        }

        .form-box.active {
            display: block;
        }

        .input-box {
            position: relative;
            margin-bottom: 30px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #fff;
            outline: none;
            font-size: 16px;
            color: #fff;
        }

        .input-box label {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            color: #aaa; /* Màu xám nhạt cho placeholder */
            pointer-events: none;
            transition: 0.5s;
        }

        .input-box input:focus ~ label,
        .input-box input:valid ~ label {
            top: -5px;
            left: 0;
            color: #ff6600; /* Màu cam cho trạng thái active */
            font-size: 12px;
        }

        .btn {
            width: 100%;
            background-color: #ff6600;
            border: none;
            padding: 10px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #ff8500;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link a {
            color: #ff6600;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-register-container">
        <div class="tabs">
            <button class="tab-link active" onclick="openTab('login')">Đăng Nhập</button>
            <button class="tab-link" onclick="openTab('register')">Đăng Ký</button>
        </div>
        
        <div id="login" class="form-box active">
            <form action="#" method="POST">
                <div class="input-box">
                    <input type="text" required>
                    <label>Tên người dùng</label>
                </div>
                <div class="input-box">
                    <input type="password" required>
                    <label>Mật khẩu</label>
                </div>
                <button type="submit" class="btn">Đăng Nhập</button>
                <div class="register-link">
                    <p>Bạn chưa có tài khoản? <a href="#" onclick="openTab('register')">Đăng ký ngay</a></p>
                </div>
            </form>
        </div>

        <div id="register" class="form-box">
            <form action="#" method="POST">
                <div class="input-box">
                    <input type="text" required>
                    <label>Tên người dùng</label>
                </div>
                <div class="input-box">
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <input type="password" required>
                    <label>Mật khẩu</label>
                </div>
                <button type="submit" class="btn">Đăng Ký</button>
            </form>
        </div>
    </div>

    <script>
        function openTab(tabName) {
            // Ẩn tất cả các form
            var forms = document.getElementsByClassName('form-box');
            for (var i = 0; i < forms.length; i++) {
                forms[i].classList.remove('active');
            }

            // Hiện form được chọn
            document.getElementById(tabName).classList.add('active');

            // Đổi trạng thái active của các tab
            var tabs = document.getElementsByClassName('tab-link');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
