<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SZ2PGMC55Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SZ2PGMC55Q');
    </script>

    <!-- Favicon -->
    <link rel="icon" href="/assets/icon_final.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Skills Quiz</title>

    <!-- External CSS for Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Inline Style for Layout -->
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Gray icons in the background */
        .bg-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            font-size: 100px;
        }

        .icon1 {
            top: 10%;
            left: 5%;
        }

        .icon2 {
            top: 20%;
            right: 10%;
        }

        .icon3 {
            bottom: 15%;
            left: 10%;
        }

        .icon4 {
            bottom: 5%;
            right: 20%;
        }

        /* Quiz container */
        .quiz-container {
            width: 400px;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #47a447;
        }

        .question {
            margin-bottom: 20px;
        }

        .question h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .answers {
            list-style: none;
            padding: 0;
        }

        .answers li {
            margin-bottom: 15px;
        }

        .answers input {
            margin-right: 10px;
        }

        /* Button styles */
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #47a447;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #398439;
        }

        /* Result box */
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Background icons for effect -->
    <i class="fas fa-code bg-icon icon1"></i>
    <i class="fas fa-terminal bg-icon icon2"></i>
    <i class="fas fa-laptop-code bg-icon icon3"></i>
    <i class="fas fa-keyboard bg-icon icon4"></i>

    <!-- Quiz Container -->
    <div class="quiz-container">
        <h1>Python Skills Quiz</h1>
        <div id="quiz">
            <div class="question">
                <h2>Question 1: What does the 'len()' function do in Python?</h2>
                <ul class="answers">
                    <li><label><input type="radio" name="q1" value="a"> a) Returns the length of a list</label></li>
                    <li><label><input type="radio" name="q1" value="b"> b) Returns the sum of a list</label></li>
                    <li><label><input type="radio" name="q1" value="c"> c) Returns the maximum value of a list</label></li>
                    <li><label><input type="radio" name="q1" value="d"> d) Returns the minimum value of a list</label></li>
                </ul>
            </div>

            <div class="question">
                <h2>Question 2: How do you define a function in Python?</h2>
                <ul class="answers">
                    <li><label><input type="radio" name="q2" value="a"> a) `function myFunction()`</label></li>
                    <li><label><input type="radio" name="q2" value="b"> b) `def myFunction()`</label></li>
                    <li><label><input type="radio" name="q2" value="c"> c) `myFunction() =>`</label></li>
                    <li><label><input type="radio" name="q2" value="d"> d) `define myFunction()`</label></li>
                </ul>
            </div>

            <div class="question">
                <h2>Question 3: What is the output of `print(2 ** 3)` in Python?</h2>
                <ul class="answers">
                    <li><label><input type="radio" name="q3" value="a"> a) 5</label></li>
                    <li><label><input type="radio" name="q3" value="b"> b) 6</label></li>
                    <li><label><input type="radio" name="q3" value="c"> c) 8</label></li>
                    <li><label><input type="radio" name="q3" value="d"> d) 9</label></li>
                </ul>
            </div>

            <button id="submit" class="btn">Submit Answers</button>

            <div id="result" class="result"></div>
        </div>
    </div>

    <!-- Script for Quiz Logic -->
    <script>
        document.getElementById('submit').addEventListener('click', function() {
            // Answers key
            const correctAnswers = {
                q1: 'a',
                q2: 'b',
                q3: 'c'
            };

            // Collect user answers
            const userAnswers = {
                q1: document.querySelector('input[name="q1"]:checked')?.value,
                q2: document.querySelector('input[name="q2"]:checked')?.value,
                q3: document.querySelector('input[name="q3"]:checked')?.value
            };

            // Calculate score
            let score = 0;
            let totalQuestions = Object.keys(correctAnswers).length;

            for (let question in correctAnswers) {
                if (userAnswers[question] === correctAnswers[question]) {
                    score++;
                }
            }

            // Display the result
            let resultMessage = `You scored ${score} out of ${totalQuestions}`;
            if (score === totalQuestions) {
                resultMessage += ' - Perfect Score!';
            } else if (score >= totalQuestions / 2) {
                resultMessage += ' - Good Job!';
            } else {
                resultMessage += ' - Keep Practicing!';
            }

            document.getElementById('result').innerText = resultMessage;
        });
    </script>

</body>
</html>
